services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iams_db}
      POSTGRES_USER: ${POSTGRES_USER:-iams_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iams_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iams_user} -d ${POSTGRES_DB:-iams_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8001:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-0}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-iams_db}
      DB_USER: ${POSTGRES_USER:-iams_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-iams_secret}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,0.0.0.0,api.auditsence.leadrisks.com,161.97.101.121}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uv run python manage.py migrate && uv run python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
