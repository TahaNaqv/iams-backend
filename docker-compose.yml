# Local development stack for IAMS.
#
# Brings up the full on-prem topology in miniature:
#   - postgres (primary)
#   - redis (cache + Celery broker)
#   - backend (Django via gunicorn)
#   - worker (Celery)
#   - beat (Celery scheduler)
#   - flower (Celery UI on :5555)
#   - minio (S3-compatible object storage on :9000, console on :9001)
#   - mailhog (SMTP sink on :1025, UI on :8025)
#
# Bring up with: docker compose up --build
# Tail one service: docker compose logs -f backend
# Run a command:   docker compose run --rm backend manage createsuperuser

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # No host port binding — the app reaches Postgres at ``db:5432`` via
    # the docker network. For ad-hoc psql from the host, SSH-tunnel or
    # use ``docker compose exec db psql``.
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iams_db}
      POSTGRES_USER: ${POSTGRES_USER:-iams_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iams_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iams_user} -d ${POSTGRES_DB:-iams_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Pure-internal — backend reaches it at ``redis:6379`` via the
    # docker network. Removing the host binding lets us share a VPS
    # with other projects that already own host port 6379.
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    # S3 API stays internal-only; console binds to 127.0.0.1 so an
    # operator can SSH-tunnel into it without exposing on the public IP.
    expose:
      - "9000"
    ports:
      - "127.0.0.1:9001:9001"   # console — tunnel: ssh -L 9001:127.0.0.1:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/iams-evidence &&
        mc mb --ignore-existing local/iams-documents &&
        mc mb --ignore-existing local/iams-reports &&
        mc anonymous set download local/iams-reports &&
        echo 'MinIO buckets ready.'
      "
    restart: "no"

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    # SMTP stays internal; UI binds to 127.0.0.1 only (tunnel to view).
    expose:
      - "1025"
    ports:
      - "127.0.0.1:8025:8025"   # UI — tunnel: ssh -L 8025:127.0.0.1:8025

  clamav:
    # Self-hosted ClamAV daemon for AV scanning of uploaded evidence.
    # First boot downloads virus definitions and is slow (5–10 min) — the
    # healthcheck only goes green once the daemon is ready to accept INSTREAM
    # requests, so dependent services wait correctly.
    image: clamav/clamav:stable
    restart: unless-stopped
    # Pure-internal — worker calls clamd at ``clamav:3310``.
    expose:
      - "3310"
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 600s   # cold start downloads ~250MB of signatures

  backend:
    build: .
    image: iams-backend:dev
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      DJANGO_AUTO_MIGRATE: "1"
      DJANGO_COLLECTSTATIC: "0"  # served by Django in dev
    volumes:
      - .:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["web"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    image: iams-backend:dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      # Worker can wait for clamav if local AV is desired; set CLAMD_SKIP=1
      # to bypass when running compose without the clamav service.
      CLAMD_HOST: ${CLAMD_HOST:-clamav}
      CLAMD_PORT: ${CLAMD_PORT:-3310}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["worker"]

  beat:
    image: iams-backend:dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["beat"]

  flower:
    image: iams-backend:dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:5555:5555"   # tunnel: ssh -L 5555:127.0.0.1:5555
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
    depends_on:
      redis:
        condition: service_healthy
    command: ["flower"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_db:
  backend_static:
  backend_media:
